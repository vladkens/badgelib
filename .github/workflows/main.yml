name: main

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/

      - run: rustup update --no-self-update stable && rustup default stable
      - run: make check
      - run: make test

  publish:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - run: rustup update --no-self-update stable && rustup default stable

      - name: Check Cargo.toml version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          CARGO_VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "Error: tag ${TAG} does not match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Extract changelog entry
        run: |
          VERSION="${{ github.ref_name }}"
          NOTES=$(awk "/^## ${VERSION}/{found=1; next} /^## /{found=0} found && !/^---$/" changelog.md)
          if [ -z "$NOTES" ]; then
            echo "Error: no changelog entry found for ${VERSION}"
            exit 1
          fi
          echo "$NOTES" > release_notes.txt

      - run: gh release create ${{ github.ref_name }} --title ${{ github.ref_name }} --notes-file release_notes.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
